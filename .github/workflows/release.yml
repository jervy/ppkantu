name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build-and-release:
    runs-on: windows-latest

    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore
        run: dotnet restore LiteImageViewer.sln

      - name: Build
        run: dotnet build LiteImageViewer.sln -c Release --no-restore

      - name: Publish normal directory
        run: dotnet publish LiteImageViewer/LiteImageViewer.csproj -c Release -r win-x64 --self-contained false -v minimal -o "$env:GITHUB_WORKSPACE/dist/win-x64"

      - name: Publish single-file
        run: dotnet publish LiteImageViewer/LiteImageViewer.csproj -c Release -r win-x64 --self-contained false -p:PublishSingleFile=true -v minimal -o "$env:GITHUB_WORKSPACE/dist/win-x64-single"

      - name: Package artifacts
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path "$env:GITHUB_WORKSPACE/dist/zips" | Out-Null
          Compress-Archive -Path "$env:GITHUB_WORKSPACE/dist/win-x64/*" -DestinationPath "$env:GITHUB_WORKSPACE/dist/zips/kantu-win-x64.zip" -Force
          Compress-Archive -Path "$env:GITHUB_WORKSPACE/dist/win-x64-single/*" -DestinationPath "$env:GITHUB_WORKSPACE/dist/zips/kantu-win-x64-single.zip" -Force

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/zips/kantu-win-x64.zip
            dist/zips/kantu-win-x64-single.zip
          generate_release_notes: true
